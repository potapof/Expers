name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 20m
          script: |
            PROJECT_DIR=$(find "$HOME" -maxdepth 3 -name "docker-compose.yml" 2>/dev/null | head -1 | xargs dirname)
            if [ -z "$PROJECT_DIR" ]; then
              echo "Project directory not found"
              exit 1
            fi
            cd "$PROJECT_DIR"

            echo "=== Disk ==="
            df -h / | tail -1

            echo "=== Deploy ==="
            git pull
            docker compose down --remove-orphans
            docker rm -f $(docker ps -aq) 2>/dev/null || true
            sudo fuser -k 8080/tcp 2>/dev/null || true
            sleep 2
            ss -tlnp | grep 8080 || echo "Port 8080 is free"
            docker compose up -d --build app
            sleep 10
            docker compose exec app npm run db:migrate
            sudo systemctl reload caddy

            echo "=== Diagnostics ==="
            docker compose ps
            echo "--- app health ---"
            curl -sf http://localhost:8080/api/health && echo "OK: app" || echo "FAIL: app"
            echo "--- caddy health ---"
            curl -sf http://localhost:2019/config/ 2>/dev/null && echo "OK: caddy api" || echo "WARN: caddy api"
            echo "--- public check ---"
            curl -sf --max-time 5 https://expers.ru/api/health && echo "OK: public" || echo "FAIL: public"
            echo "--- caddy status ---"
            sudo systemctl status caddy --no-pager -l 2>&1 | tail -10
            echo "--- app logs ---"
            docker compose logs --tail=15 app
            echo "=== Deploy complete ==="
