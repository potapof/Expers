name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      BASE_URL: http://localhost:8080
      JWT_SECRET: test-secret-for-ci
      TBANK_TEST_MODE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: docker compose up -d --build
      - run: docker compose exec -T app npm run db:migrate
      - run: npm run test:e2e -- --project=chromium
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/

  accessibility:
    name: Accessibility
    runs-on: ubuntu-latest
    env:
      BASE_URL: http://localhost:8080
      JWT_SECRET: test-secret-for-ci
      TBANK_TEST_MODE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - run: docker compose up -d --build
      - run: docker compose exec -T app npm run db:migrate
      - run: npx playwright test e2e/accessibility/

  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    env:
      BASE_URL: http://localhost:8080
      JWT_SECRET: test-secret-for-ci
      TBANK_TEST_MODE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - run: docker compose up -d --build
      - run: docker compose exec -T app npm run db:migrate
      - run: npx playwright test e2e/visual/
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diffs
          path: test-results/

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high

  load-tests:
    name: Load Tests (k6)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    env:
      BASE_URL: http://localhost:8080
      JWT_SECRET: test-secret-for-ci
      TBANK_TEST_MODE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: docker compose up -d --build
      - run: docker compose exec -T app npm run db:migrate
      - name: Run k6 load test
        uses: grafana/k6-action@v1
        with:
          filename: scripts/load/k6-api.js
